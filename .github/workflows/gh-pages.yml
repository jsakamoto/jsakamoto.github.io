name: github pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@v6

      # Install .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"
      - name: Install .NET WebAssembly Tools
        run: dotnet workload install wasm-tools

      # Add GitHub Packages as a NuGet source
      - name: Add GitHub Packages source
        run: dotnet nuget add source "https://nuget.pkg.github.com/jsakamoto/index.json" --name "GitHubPackages" --username "jsakamoto" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text

      # Publish the site
      - name: Publish
        run: dotnet publish CUIFlavoredPortfolioSite/CUIFlavoredPortfolioSite.csproj -c:Release -o:public -p:GHPages=true

      # Deploy the site
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public/wwwroot
          force_orphan: true
